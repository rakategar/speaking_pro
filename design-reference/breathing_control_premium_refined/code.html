<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes breath-cycle {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            25% { transform: scale(1.8); opacity: 0.8; } /* Inhale (4s) */
            50% { transform: scale(1.8); opacity: 0.8; } /* Hold (4s) */
            100% { transform: scale(1); opacity: 0.3; }  /* Exhale (8s) */
        }

        .breath-indicator-animation {
            animation: breath-cycle 16s ease-in-out infinite;
        }

        .breath-pulse {
            animation: pulse-ring 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 162, 253, 0.4); }
            70% { transform: scale(1); box-shadow: 0 0 0 40px rgba(0, 162, 253, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 162, 253, 0); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .aqua-gradient {
            background: radial-gradient(circle at center, #9cf0ff 0%, #f7f9fb 70%);

<script>
        // Simple logic for the breath text/timer sync (mock logic)
        const statusEl = document.getElementById('breath-status');
        const timerEl = document.getElementById('breath-timer');
        
        let cycleTime = 0;
        
        setInterval(() => {
            cycleTime = (cycleTime + 1) % 16;
            
            if (cycleTime < 4) {
                statusEl.innerText = 'Inhale';
                timerEl.innerText = 4 - cycleTime;
            } else if (cycleTime < 8) {
                statusEl.innerText = 'Hold';
                timerEl.innerText = 8 - cycleTime;
            } else {
                statusEl.innerText = 'Exhale';
                timerEl.innerText = 16 - cycleTime;
            }
        }, 1000);

        // Hover gloss effect script
        document.querySelectorAll('button, .glass-panel').forEach(el => {
            el.addEventListener('mousemove', e => {
                const rect = el.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                el.style.setProperty('--mouse-x', `${x}px`);
                el.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
