                        "on-secondary": "#ffffff",

                        "surface-bright": "#f7f9fb",
                        "tertiary-fixed-dim": "#00daf3",
                        "surface-container": "#eceef0",

                    },
                    "borderRadius": {

                    "fontFamily": {

<body class="bg-background text-on-surface font-body-md overflow-x-hidden min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile py-4 bg-surface/80 backdrop-blur-xl shadow-sm">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-container-high transition-colors text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile font-bold text-primary">AIUEO Drill</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden bg-primary-container flex items-center justify-center text-on-primary-container shadow-sm border border-white/20">
<span class="material-symbols-outlined">person</span>
</div>
</header>
<main class="pt-24 pb-32 px-margin-mobile max-w-2xl mx-auto flex flex-col gap-8">
<!-- Large Letter Display (Bento Hero) -->
<div class="relative flex flex-col items-center justify-center py-12 px-6 bg-white rounded-3xl border border-slate-100 shadow-[0_4px_20px_rgba(0,163,255,0.05)] overflow-hidden">
<div class="absolute inset-0 opacity-10">

</div>
<div class="relative z-10 w-48 h-48 flex items-center justify-center rounded-full bg-white border-2 border-secondary-container/20 glow-pulse" id="target-letter">
<span class="font-display-lg text-[120px] text-primary tracking-tight leading-none font-bold">A</span>
</div>
<div class="mt-8 text-center relative z-10">
<span class="inline-flex items-center gap-2 px-3 py-1 bg-secondary-container/10 text-secondary-container rounded-full font-label-sm text-label-sm mb-3">
<span class="material-symbols-outlined text-[14px]">volume_up</span>
                    Standard Vowel
                </span>
<p class="font-title-lg text-title-lg text-primary">Pronounce: /ɑː/</p>
</div>
</div>
<!-- Instructional Bento Card -->
<div class="bg-primary-container text-on-primary-container p-6 rounded-3xl shadow-sm border border-white/5 relative overflow-hidden">
<div class="flex gap-4 items-start relative z-10">
<div class="p-3 rounded-2xl bg-on-primary-fixed-variant/20 text-secondary-fixed-dim">
<span class="material-symbols-outlined">info</span>
</div>
<div>
<h3 class="font-title-lg text-title-lg text-white mb-2">Coach's Tip</h3>
<p class="font-body-md text-body-md text-on-primary-container/80 leading-relaxed">
                        Open your mouth wide and pronounce clearly. Keep your tongue flat for a resonance that carries across the room.
                    </p>
</div>
</div>
<!-- Decorative Subtle Glow -->
<div class="absolute -bottom-10 -right-10 w-32 h-32 bg-secondary-container/20 blur-[50px] rounded-full"></div>
</div>
<!-- Voice Input Visualizer Section -->
<div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-[0_4px_20px_rgba(0,163,255,0.05)]">
<div class="flex justify-between items-center mb-6">
<h4 class="font-label-md text-label-md text-text-secondary uppercase tracking-wider">Voice Analysis</h4>
<div class="flex gap-1 h-4 items-center" id="visualizer">
<!-- Dynamic visualizer bars -->
<div class="w-1 bg-secondary-container/20 rounded-full h-2 transition-all duration-100 shadow-sm" style="height: 4px;"></div>
<div class="w-1 bg-secondary-container/40 rounded-full h-3 transition-all duration-100 shadow-sm" style="height: 6px;"></div>
<div class="w-1 bg-secondary-container/60 rounded-full h-4 transition-all duration-100 shadow-sm" style="height: 8px;"></div>
<div class="w-1 bg-secondary-container/80 rounded-full h-2 transition-all duration-100 shadow-sm" style="height: 4px;"></div>
<div class="w-1 bg-secondary-container rounded-full h-1 transition-all duration-100 shadow-sm" style="height: 6px;"></div>
</div>
</div>
<div class="flex flex-col gap-6">
<div class="flex justify-center items-center py-4">
<button class="group relative w-20 h-20 flex items-center justify-center bg-secondary-container text-white rounded-full shadow-[0_8px_25px_rgba(0,162,253,0.3)] hover:scale-105 active:scale-95 transition-all duration-300" id="record-btn">
<span class="material-symbols-outlined text-4xl" id="mic-icon">mic</span>
<!-- Ripple Effect on Record -->
<div class="absolute inset-0 rounded-full bg-secondary-container opacity-20 scale-100 pointer-events-none" id="ripple"></div>
</button>
</div>
<div class="grid grid-cols-2 gap-bento-gap">
<button class="flex items-center justify-center gap-2 py-4 px-6 rounded-2xl bg-surface-container-low text-on-surface-variant font-label-md text-label-md hover:bg-surface-container transition-colors active:scale-95">
<span class="material-symbols-outlined">replay</span>
                        Retry
                    </button>
<button class="flex items-center justify-center gap-2 py-4 px-6 rounded-2xl bg-primary text-white font-label-md text-label-md hover:opacity-90 transition-opacity active:scale-95">
                        Next Letter
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</div>
<!-- Progress Overview -->
<div class="flex gap-bento-gap items-center justify-between bg-surface-container-low p-4 rounded-2xl">
<div class="flex -space-x-2">
<div class="w-8 h-8 rounded-full border-2 border-white bg-secondary-container flex items-center justify-center text-[10px] text-white font-bold">A</div>
<div class="w-8 h-8 rounded-full border-2 border-white bg-surface-container-highest flex items-center justify-center text-[10px] text-on-surface-variant font-bold">I</div>
<div class="w-8 h-8 rounded-full border-2 border-white bg-surface-container-highest flex items-center justify-center text-[10px] text-on-surface-variant font-bold">U</div>
<div class="w-8 h-8 rounded-full border-2 border-white bg-surface-container-highest flex items-center justify-center text-[10px] text-on-surface-variant font-bold">E</div>
<div class="w-8 h-8 rounded-full border-2 border-white bg-surface-container-highest flex items-center justify-center text-[10px] text-on-surface-variant font-bold">O</div>
</div>
<p class="font-label-sm text-label-sm text-text-secondary">Progress: 20%</p>
</div>
</main>
<!-- BottomNavBar -->

<script>
        // Micro-interactions and Simulation
        const recordBtn = document.getElementById('record-btn');
        const micIcon = document.getElementById('mic-icon');
        const ripple = document.getElementById('ripple');
        const visualizer = document.getElementById('visualizer');
        const bars = visualizer.querySelectorAll('div');
        
        let isRecording = false;
        let animationFrame;

        function animateBars() {
            if (!isRecording) return;
            bars.forEach(bar => {
                const height = Math.random() * 16 + 4;
                bar.style.height = `${height}px`;
            });
            animationFrame = requestAnimationFrame(animateBars);
        }

        recordBtn.addEventListener('click', () => {
            isRecording = !isRecording;
            
            if (isRecording) {
                micIcon.innerText = 'stop';
                recordBtn.classList.add('bg-error');
                recordBtn.classList.remove('bg-secondary-container');
                ripple.classList.add('animate-ping');
                animateBars();
            } else {
                micIcon.innerText = 'mic';
                recordBtn.classList.add('bg-secondary-container');
                recordBtn.classList.remove('bg-error');
                ripple.classList.remove('animate-ping');
                cancelAnimationFrame(animationFrame);
                // Reset bars
                bars.forEach((bar, i) => bar.style.height = `${(i % 3 + 2) * 2}px`);
            }
        });

        // Initialize visualizer state
        bars.forEach((bar, i) => bar.style.height = `${(i % 3 + 2) * 2}px`);
    </script>


</body></html>
